<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
   <nav class="navbar">
  <div class="logo">BidFlow</div>
  <div class="nav-links">
    <a href="#" class="sign-in trigger-auth">Sign in</a>
    <button class="btn-get-started trigger-auth">Get Started</button>
  </div>
</nav>
<div class="container"></div>
 <img src="fitness.png" alt="Fitness" class="img">
 <div class="hero-content">
    <h1>Push Beyond Your Limits,<br>Every Single Day</h1>

    <p>
        BidFlow helps you stay focused, build discipline,
        and track your fitness journey with clarity and consistency.
    </p>

    <button class="hero-btn trigger-auth">Start Your Journey →</button>
    <div id="signin-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div class="modal-header">
              <h2>BidFlow </h2>
            <p>Continue your daily ritual</p>
        </div>

        <button class="google-btn">
            <img src="images.png" alt="Google">
            Continue with Google
        </button>

        <div class="divider">or</div>

        <form>
            <div class="input-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id = "pass" placeholder="Password" required>
                <p id="msg"></p>
            </div>
            <button type="submit" id="signin-btn" class="auth-submit-btn">Sign in</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>
    </div>
</div>
</div>  


</div>
 <script type="module" src="main.js"></script>
</body>
</html>
